---
layout: default
---

{% assign current_lang = page.lang | default: site.default_lang %}
{% assign t = site.data.translations[current_lang].guestbook %}

<div class="guestbook-page">

  <header class="guestbook-header">
    <h1>{{ t.title }}</h1>
    <p class="guestbook-subtitle">{{ t.intro }}</p>
  </header>

  <div class="guestbook-body">

    <div class="guestbook-form-col">
      <h2 class="guestbook-col-title">{{ t.form_title }}</h2>
      <form id="guestbook-form" data-api="{{ site.guestbook_api_url }}" novalidate>
        <div class="form-group">
          <label for="gb-name">{{ t.field_name }} <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="gb-name" name="name" required maxlength="80"
            placeholder="{{ t.placeholder_name }}" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="gb-website">{{ t.field_website }} <span class="form-optional">({{ t.optional }})</span></label>
          <input type="url" id="gb-website" name="website" maxlength="200"
            placeholder="https://yoursite.com" autocomplete="url" />
        </div>
        <div class="form-group">
          <label for="gb-message">{{ t.field_message }} <span class="required" aria-hidden="true">*</span></label>
          <textarea id="gb-message" name="message" required maxlength="300" rows="5"
            placeholder="{{ t.placeholder_message }}"></textarea>
          <span class="char-hint">{{ t.char_hint }}</span>
        </div>
        <button type="submit" class="gb-submit">{{ t.submit }}</button>
        <div id="gb-status" role="status" aria-live="polite"></div>
      </form>
    </div>

    <div class="guestbook-entries-col">
      <h2 class="guestbook-col-title">{{ t.entries_title }}</h2>
      <div id="guestbook-entries">
        <p class="guestbook-loading">{{ t.loading }}</p>
      </div>
    </div>

  </div>

</div>

<script src="{{ '/assets/js/guestbook.js' | relative_url }}"></script>
